<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MyAI hero diagram</title>
  <desc id="desc">A diagram showing scattered AI tool configuration on the left, a reusable MyAI profile in the center, and restored setup on a new machine and Codex config on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="72" x2="1080" y2="608" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9F1"/>
      <stop offset="1" stop-color="#F2F4F7"/>
    </linearGradient>
    <linearGradient id="beam" x1="276" y1="312" x2="928" y2="312" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8A3D" stop-opacity="0.05"/>
      <stop offset="0.52" stop-color="#FF8A3D" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3A7AFE" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1280" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#111827" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-20" y="-20" width="1240" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 16px; letter-spacing: 0.18em; text-transform: uppercase; fill: #6B7280; }
      .headline { font-size: 38px; font-weight: 700; fill: #0F172A; }
      .body { font-size: 18px; fill: #475569; }
      .label { font-size: 14px; fill: #334155; }
      .cardTitle { font-size: 18px; font-weight: 700; fill: #0F172A; }
      .darkTitle { font-size: 18px; font-weight: 700; fill: #F8FAFC; }
      .darkBody { font-size: 14px; fill: #CBD5E1; }
      .chip { font-size: 13px; font-weight: 700; }
    </style>
  </defs>

  <rect x="24" y="24" width="1152" height="632" rx="28" fill="url(#bg)"/>
  <rect x="24.5" y="24.5" width="1151" height="631" rx="27.5" stroke="#E5E7EB"/>

  <text x="86" y="86" class="sans eyebrow">portable ai profiles</text>
  <text x="86" y="136" class="sans headline">Turn scattered tool config into a reusable setup.</text>
  <text x="86" y="170" class="sans body">Prompts, MCPs, preferences, and local rules move from one machine-bound mess into one profile you can restore, reuse, and sync.</text>

  <rect x="86" y="212" width="140" height="34" rx="17" fill="#111827"/>
  <text x="156" y="234" text-anchor="middle" class="sans chip" fill="#F8FAFC">alpha wedge</text>
  <rect x="238" y="212" width="268" height="34" rx="17" fill="#FFF1E8" stroke="#FED7AA"/>
  <text x="372" y="234" text-anchor="middle" class="mono chip" fill="#C2410C">Claude Code -&gt; MyAI -&gt; Codex</text>

  <g filter="url(#softShadow)">
    <rect x="82" y="286" width="256" height="266" rx="26" fill="#FFFFFF"/>
    <rect x="82.5" y="286.5" width="255" height="265" rx="25.5" stroke="#E5E7EB"/>
  </g>
  <text x="108" y="326" class="sans cardTitle">What teams have today</text>
  <text x="108" y="350" class="sans body">Useful, proven, and scattered.</text>

  <g>
    <rect x="108" y="380" width="90" height="72" rx="14" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="123" y="409" class="mono label">.claude/</text>
    <text x="123" y="430" class="sans label" fill="#64748B">rules</text>
    <text x="123" y="448" class="sans label" fill="#64748B">skills</text>

    <rect x="210" y="380" width="102" height="72" rx="14" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="225" y="409" class="mono label">.agents/</text>
    <text x="225" y="430" class="sans label" fill="#64748B">codex config</text>
    <text x="225" y="448" class="sans label" fill="#64748B">persona</text>

    <rect x="108" y="466" width="112" height="62" rx="14" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="123" y="493" class="mono label">prompts/</text>
    <text x="123" y="512" class="sans label" fill="#9A3412">working text</text>

    <rect x="232" y="466" width="82" height="62" rx="14" fill="#ECFDF3" stroke="#BBF7D0"/>
    <text x="247" y="493" class="mono label">mcp</text>
    <text x="247" y="512" class="sans label" fill="#166534">servers</text>
  </g>

  <rect x="314" y="354" width="578" height="188" rx="94" fill="url(#beam)"/>
  <path d="M322 448C378 448 404 428 436 420C474 410 505 413 548 413" stroke="#FF8A3D" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 11"/>
  <path d="M652 413C699 413 730 410 766 420C805 431 835 448 882 448" stroke="#3A7AFE" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 11"/>

  <g filter="url(#shadow)">
    <rect x="446" y="272" width="308" height="294" rx="30" fill="#0F172A"/>
  </g>
  <rect x="468" y="298" width="264" height="28" rx="14" fill="#1E293B"/>
  <circle cx="489" cy="312" r="5" fill="#FF8A3D"/>
  <circle cx="507" cy="312" r="5" fill="#FBBF24"/>
  <circle cx="525" cy="312" r="5" fill="#34D399"/>
  <text x="548" y="317" class="mono darkBody">profile.yaml</text>

  <text x="478" y="358" class="sans darkTitle">MyAI profile</text>
  <text x="478" y="382" class="sans darkBody">One portable bundle for what actually makes a workflow work.</text>

  <rect x="478" y="412" width="244" height="34" rx="17" fill="#132238" stroke="#334155"/>
  <text x="498" y="434" class="mono darkBody">prompts/code-review.md</text>

  <rect x="478" y="454" width="214" height="34" rx="17" fill="#132238" stroke="#334155"/>
  <text x="498" y="476" class="mono darkBody">mcps/github.yaml</text>

  <rect x="478" y="496" width="228" height="34" rx="17" fill="#132238" stroke="#334155"/>
  <text x="498" y="518" class="mono darkBody">preferences/team.md</text>

  <rect x="478" y="538" width="182" height="34" rx="17" fill="#132238" stroke="#334155"/>
  <text x="498" y="560" class="mono darkBody">sync: [codex]</text>

  <g filter="url(#softShadow)">
    <rect x="856" y="286" width="258" height="266" rx="26" fill="#FFFFFF"/>
    <rect x="856.5" y="286.5" width="257" height="265" rx="25.5" stroke="#E5E7EB"/>
  </g>
  <text x="882" y="326" class="sans cardTitle">What teams get back</text>
  <text x="882" y="350" class="sans body">Restored setup, not reconstructed memory.</text>

  <rect x="882" y="380" width="206" height="82" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
  <rect x="900" y="398" width="170" height="12" rx="6" fill="#1E293B"/>
  <rect x="900" y="420" width="132" height="10" rx="5" fill="#CBD5E1"/>
  <rect x="900" y="438" width="148" height="10" rx="5" fill="#CBD5E1"/>
  <text x="900" y="374" class="mono label">new machine</text>

  <rect x="882" y="478" width="206" height="50" rx="16" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="902" y="508" class="mono label" fill="#1D4ED8">config.toml</text>
  <text x="980" y="508" class="sans label" fill="#2563EB">codex synced</text>

  <rect x="86" y="590" width="300" height="38" rx="19" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="236" y="614" text-anchor="middle" class="sans chip" fill="#334155">search • apply • rollback • report</text>

  <rect x="450" y="590" width="300" height="38" rx="19" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="600" y="614" text-anchor="middle" class="sans chip" fill="#C2410C">save one setup once</text>

  <rect x="814" y="590" width="300" height="38" rx="19" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="964" y="614" text-anchor="middle" class="sans chip" fill="#1D4ED8">restore it anywhere</text>
</svg>
